function splitSentences(text) {
  const s = text.match(/[^。！？.!?\n]+[。！？.!?\n]*/g);
  return s ? s.map(s=>s.trim()).filter(s=>s.length>0) : [text];
}
function fmtTime() { const d=new Date(); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }

const WaveBar = ({color,playing}) => {
  const hs=[3,7,5,10,14,10,5,7,3,8,12,8,3,5,10,7,4,3];

  </div>;
};

// 用 Web Audio API 把多个 mp3 URL 拼接成一个 ObjectURL
async function mergeAudioUrls(urls) {
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const buffers = await Promise.all(urls.map(async url => {
    const res = await fetch(url);
    const ab = await res.arrayBuffer();
    return ctx.decodeAudioData(ab);
  }));
  const totalLen = buffers.reduce((s,b)=>s+b.length,0);
  const merged = ctx.createBuffer(1, totalLen, buffers[0].sampleRate);
  const ch = merged.getChannelData(0);
  let offset = 0;
  for (const b of buffers) { ch.set(b.getChannelData(0), offset); offset += b.length; }
  // encode to wav
  const wav = audioBufferToWav(merged);
  await ctx.close();
  return URL.createObjectURL(new Blob([wav],{type:"audio/wav"}));
}

function audioBufferToWav(buf) {
  const sr=buf.sampleRate, data=buf.getChannelData(0);
  const len=data.length, ab=new ArrayBuffer(44+len*2), view=new DataView(ab);
  const w=(o,s)=>{for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i));};
  w(0,"RIFF");view.setUint32(4,36+len*2,true);w(8,"WAVE");w(12,"fmt ");
  view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,1,true);
  view.setUint32(24,sr,true);view.setUint32(28,sr*2,true);
  view.setUint16(32,2,true);view.setUint16(34,16,true);w(36,"data");
  view.setUint32(40,len*2,true);
  for(let i=0;i<len;i++){const s=Math.max(-1,Math.min(1,data[i]));view.setInt16(44+i*2,s<0?s*0x8000:s*0x7FFF,true);}
  return ab;
}

const V5 = ({onB}) => {
  const cmap = {}; CH.forEach(c=>{cmap[c.id]=c;});
  const shapes = ["42% 58% 65% 35%/38% 52% 58% 48%","58% 42% 35% 65%/55% 35% 65% 45%","65% 35% 45% 55%/48% 58% 42% 52%","35% 65% 55% 45%/62% 38% 55% 45%","50% 50% 38% 62%/45% 55% 50% 50%","55% 45% 60% 40%/40% 60% 45% 55%","38% 62% 50% 50%/55% 45% 58% 42%","62% 38% 42% 58%/42% 58% 38% 62%","45% 55% 55% 45%/58% 42% 48% 52%"];
  const pads = [[20,16],[16,20],[18,14],[14,18],[20,18],[16,16],[18,20],[14,16],[20,14]];
  const Blob = ({card,i}) => { const c=cmap[card.cid]; const sh=shapes[i]; const pd=pads[i];
    return <div className="flex items-center justify-center p-1">
      <div className="flex flex-col justify-center" style={{borderRadius:sh,background:`linear-gradient(145deg,${c.grad[0]}DD,${c.grad[1]}AA)`,paddingTop:pd[0]+12,paddingBottom:pd[1]+12,paddingLeft:pd[0],paddingRight:pd[1]}}>

};

function App() {
  const [vw,sV]=useState("select");
  const [ch,sCh]=useState(CH[1]);
  const [fd,sFd]=useState(false);
  const go=(t,nc)=>{sFd(true);setTimeout(()=>{if(nc)sCh(nc);sV(t);setTimeout(()=>sFd(false),50);},280);};
  return <div className="w-full h-screen relative overflow-hidden" style={{fontFamily:F}}>
    {fd&&<div className="absolute inset-0 z-[100] pointer-events-none" style={{background:vw==="select"||vw==="gallery"?"#0F0C13":vw==="orb"||vw==="card"?PBG:ch?.ob||"#0F0C13"}}/>}
    <div className="absolute inset-0 transition-opacity duration-300" style={{opacity:fd?0:1}}>
      {vw==="select"&&<V1 onSelect={c=>go("orb",c)}/>}
      {vw==="orb"&&<V2 key={"o-"+ch.id} ch={ch} onH={()=>go("chat")} onB={()=>go("select")} onC={()=>go("card")}/>}
      {vw==="chat"&&<V3 key={"c-"+ch.id} ch={ch} onO={()=>go("orb")} onC={()=>go("card")}/>}
      {vw==="card"&&<V4 key={"d-"+ch.id} ch={ch} onG={()=>go("gallery")}/>}
      {vw==="gallery"&&<V5 onB={()=>go("card")}/>}
    </div>
  </div>;
}


    createRoot(document.getElementById("root")).render(<App />);
